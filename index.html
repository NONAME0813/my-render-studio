<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI Rendering Studio (OpenAI)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-lg">
        <h1 class="text-2xl font-bold text-center mb-8 text-green-600">OpenAI 이미지 렌더링 도구</h1>
        
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">🔑 OpenAI API KEY</label>
                <input type="password" id="apiKey" placeholder="sk-...로 시작하는 키 입력" 
                       class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-400 outline-none">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">📝 렌더링 묘사</label>
                <textarea id="promptText" rows="3" class="w-full p-3 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-green-400"
                placeholder="예: 깔끔한 알루미늄 재질의 산업용 프레임, 8k 고해상도 렌더링, 스튜디오 조명"></textarea>
            </div>
        </div>

        <button onclick="startOpenAI()" id="mainBtn" 
                class="w-full bg-green-600 text-white mt-8 py-4 rounded-2xl font-black text-lg hover:bg-green-700 transition-all shadow-lg active:scale-95">
            DALL-E 렌더링 시작
        </button>

        <div id="loader" class="hidden mt-6 text-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-600 mx-auto"></div>
            <p class="mt-3 text-sm font-bold text-green-500">OpenAI가 이미지를 생성 중입니다...</p>
        </div>
    </div>

    <script>
        const PROXY = "https://cors-anywhere.herokuapp.com/";

        async function startOpenAI() {
            const key = document.getElementById('apiKey').value.trim();
            const prompt = document.getElementById('promptText').value;
            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('loader');

            if (!key || !prompt) return alert("API 키와 설명을 모두 입력해주세요!");

            btn.disabled = true;
            btn.classList.add('bg-gray-400');
            loader.classList.remove('hidden');

            try {
                // OpenAI DALL-E 3 API 호출
                const response = await fetch(PROXY + "https://api.openai.com/v1/images/generations", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json",
                        "X-Requested-With": "XMLHttpRequest"
                    },
                    body: JSON.stringify({
                        model: "dall-e-3",
                        prompt: prompt + " (Please maintain a clean industrial design style, professional 3D render)",
                        n: 1,
                        size: "1024x1024"
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                if (data.data && data.data[0].url) {
                    downloadImage(data.data[0].url);
                }

            } catch (e) {
                alert("오류: " + e.message + "\n\n(CORS 승인과 API 키를 확인하세요)");
                resetUI();
            }
        }

        function downloadImage(url) {
            const a = document.createElement('a');
            a.href = url;
            a.download = "OpenAI_Render.png";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            alert("렌더링 성공! 자동 저장되었습니다.");
            resetUI();
        }

        function resetUI() {
            const btn = document.getElementById('mainBtn');
            btn.disabled = false;
            btn.classList.remove('bg-gray-400');
            document.getElementById('loader').classList.add('hidden');
        }
    </script>
</body>
</html>
