<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI Professional Rendering Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-lg">
        <h1 class="text-2xl font-bold text-center mb-8 text-blue-600">AI 이미지 렌더링 발표 도구</h1>
        
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">🔑 API 키</label>
                <input type="password" id="apiKey" placeholder="새로 발급받은 Replicate 토큰 입력" 
                       class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">🖼️ 스타일 참조 (깔끔한 사진)</label>
                <input type="file" id="styleImg" class="w-full text-sm border p-2 rounded-xl">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">📐 도면 입력 (구조 사진)</label>
                <input type="file" id="structImg" class="w-full text-sm border p-2 rounded-xl">
            </div>
        </div>

        <button onclick="startProcess()" id="mainBtn" 
                class="w-full bg-blue-600 text-white mt-8 py-4 rounded-2xl font-black text-lg hover:bg-blue-700 transition-all shadow-lg active:scale-95">
            변환 및 자동 저장
        </button>

        <div id="loader" class="hidden mt-6 text-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-3 text-sm font-bold text-blue-500" id="statusText">AI가 렌더링을 시작합니다...</p>
        </div>
    </div>

    <script>
        const PROXY = "https://cors-anywhere.herokuapp.com/"; // CORS 에러 방지용 중개 서버

        async function toBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
            });
        }

        async function startProcess() {
            const rawKey = document.getElementById('apiKey').value;
            const key = rawKey.trim().replace(/[^\x00-\x7F]/g, "");
            const style = document.getElementById('styleImg').files[0];
            const struct = document.getElementById('structImg').files[0];
            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('loader');

            if (!key || !style || !struct) return alert("모든 항목을 입력해주세요!");

            btn.disabled = true;
            btn.classList.add('bg-gray-400');
            loader.classList.remove('hidden');

            try {
                const styleB64 = await toBase64(style);
                const structB64 = await toBase64(struct);

                // 1. AI 렌더링 요청
                const response = await fetch(PROXY + "https://api.replicate.com/v1/predictions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Token ${key}`,
                        "Content-Type": "application/json",
                        "X-Requested-With": "XMLHttpRequest"
                    },
                    body: JSON.stringify({
                        version: "4f997637f90f111075673078a635817c66914b3d7b425b0959828d57d5982823",
                        input: { image: structB64, ip_adapter_image: styleB64, controlnet_1: "canny" }
                    })
                });

                const data = await response.json();
                if (data.id) checkStatus(data.id, key);
                else throw new Error("API 요청 실패");

            } catch (e) {
                alert("오류: " + e.message);
                resetUI();
            }
        }

        function checkStatus(id, key) {
            const timer = setInterval(async () => {
                document.getElementById('statusText').innerText = "이미지를 다듬는 중... (약 15초)";
                const res = await fetch(PROXY + `https://api.replicate.com/v1/predictions/${id}`, {
                    headers: { "Authorization": `Token ${key}`, "X-Requested-With": "XMLHttpRequest" }
                });
                const result = await res.json();

                if (result.status === "succeeded") {
                    clearInterval(timer);
                    downloadImage(result.output[0]);
                } else if (result.status === "failed") {
                    clearInterval(timer);
                    alert("렌더링 실패");
                    resetUI();
                }
            }, 3000);
        }

        function downloadImage(url) {
            const a = document.createElement('a');
            a.href = url;
            a.download = "Render_Result.png";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            alert("렌더링이 완료되어 자동 저장되었습니다!");
            resetUI();
        }

        function resetUI() {
            const btn = document.getElementById('mainBtn');
            btn.disabled = false;
            btn.classList.remove('bg-gray-400');
            document.getElementById('loader').classList.add('hidden');
        }
    </script>
</body>
</html>
